# Scoracle Data — local development stack
# Usage: docker compose up --build

services:
  postgrest:
    build: postgrest/
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      PGRST_DB_URI: ${DATABASE_URL}

  api:
    build: go/
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      POSTGREST_URL: http://postgrest:3000
    depends_on:
      - postgrest
