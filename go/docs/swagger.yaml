basePath: /api/v1
definitions:
  respond.ErrorResponse:
    properties:
      error:
        properties:
          code:
            type: string
          detail:
            type: string
          message:
            type: string
        type: object
    type: object
host: localhost:8000
info:
  contact:
    name: Scoracle
  description: Unified Scoracle API serving sport data pages, news, journalist tweets,
    health checks, and operational endpoints.
  license:
    name: MIT
  title: Scoracle Data API
  version: 2.0.0
paths:
  /:
    get:
      description: Returns API name, version, status, and available optimizations.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: API root info
      tags:
      - meta
  /{sport}/{entityType}/{id}:
    get:
      description: Returns the sport profile payload for an entity type and ID.
      parameters:
      - description: Sport
        enum:
        - nba
        - nfl
        - football
        in: path
        name: sport
        required: true
        type: string
      - description: Entity type
        enum:
        - player
        - team
        in: path
        name: entityType
        required: true
        type: string
      - description: Entity ID
        in: path
        name: id
        required: true
        type: integer
      - description: Season year
        in: query
        name: season
        type: integer
      - description: League ID filter
        in: query
        name: league_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
      summary: Get profile page
      tags:
      - data
  /{sport}/health:
    get:
      description: Returns sport data freshness and counts.
      parameters:
      - description: Sport
        enum:
        - nba
        - nfl
        - football
        in: path
        name: sport
        required: true
        type: string
      - description: League ID filter
        in: query
        name: league_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
      summary: Get sport health page
      tags:
      - data
  /{sport}/leagues/{leagueId}/{entityType}/{id}:
    get:
      description: Returns the sport profile payload scoped to a specific league.
      parameters:
      - description: Sport
        enum:
        - nba
        - nfl
        - football
        in: path
        name: sport
        required: true
        type: string
      - description: League ID
        in: path
        name: leagueId
        required: true
        type: integer
      - description: Entity type
        enum:
        - player
        - team
        in: path
        name: entityType
        required: true
        type: string
      - description: Entity ID
        in: path
        name: id
        required: true
        type: integer
      - description: Season year
        in: query
        name: season
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
      summary: Get league profile page
      tags:
      - data
  /{sport}/leagues/{leagueId}/health:
    get:
      description: Returns sport data freshness and counts for a specific league.
      parameters:
      - description: Sport
        enum:
        - nba
        - nfl
        - football
        in: path
        name: sport
        required: true
        type: string
      - description: League ID
        in: path
        name: leagueId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
      summary: Get league health page
      tags:
      - data
  /{sport}/leagues/{leagueId}/meta:
    get:
      description: Returns metadata and search payload for a specific league.
      parameters:
      - description: Sport
        enum:
        - nba
        - nfl
        - football
        in: path
        name: sport
        required: true
        type: string
      - description: League ID
        in: path
        name: leagueId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
      summary: Get league meta page
      tags:
      - data
  /{sport}/meta:
    get:
      description: Returns complete metadata and search payload for a sport.
      parameters:
      - description: Sport
        enum:
        - nba
        - nfl
        - football
        in: path
        name: sport
        required: true
        type: string
      - description: League ID filter
        in: query
        name: league_id
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
      summary: Get meta page
      tags:
      - data
  /{sport}/twitter/{entityType}/{id}:
    get:
      description: Returns cached tweets mentioning the given player or team. Matching
        uses the shared search_aliases logic.
      parameters:
      - description: Sport
        enum:
        - nba
        - nfl
        - football
        in: path
        name: sport
        required: true
        type: string
      - description: Entity type
        enum:
        - player
        - team
        in: path
        name: entityType
        required: true
        type: string
      - description: Entity ID
        in: path
        name: id
        required: true
        type: integer
      - description: Max tweets (1-100, default 25)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
      summary: Entity tweet feed
      tags:
      - twitter
  /{sport}/twitter/feed:
    get:
      description: Returns cached tweets from the sport's curated X List. Refreshes
        on demand when older than the TTL; concurrent refreshes are coalesced via
        singleflight.
      parameters:
      - description: Sport
        enum:
        - nba
        - nfl
        - football
        in: path
        name: sport
        required: true
        type: string
      - description: Max tweets (1-100, default 25)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
      summary: Sport tweet feed
      tags:
      - twitter
  /health:
    get:
      description: Returns basic health status and timestamp.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Health check
      tags:
      - health
  /health/cache:
    get:
      description: Returns in-memory cache statistics (active keys, expired keys).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Cache health check
      tags:
      - health
  /health/db:
    get:
      description: Verifies Postgres connectivity.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "503":
          description: Service Unavailable
          schema:
            additionalProperties: true
            type: object
      summary: Database health check
      tags:
      - health
  /news/{entityType}/{entityID}:
    get:
      description: Returns news articles about a player or team from Google News RSS.
        Supports time-window escalation and strict name matching.
      parameters:
      - description: Entity type
        enum:
        - player
        - team
        in: path
        name: entityType
        required: true
        type: string
      - description: Entity ID
        in: path
        name: entityID
        required: true
        type: integer
      - description: Sport identifier
        enum:
        - NBA
        - NFL
        - FOOTBALL
        in: query
        name: sport
        required: true
        type: string
      - description: Team name for player context
        in: query
        name: team
        type: string
      - description: Max articles (1-50, default 10)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
        "502":
          description: Bad Gateway
          schema:
            $ref: '#/definitions/respond.ErrorResponse'
      summary: Get entity news
      tags:
      - news
  /news/status:
    get:
      description: Returns configuration state for the Google News RSS source.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: News service status
      tags:
      - news
  /twitter/status:
    get:
      description: Returns per-sport cache state, since_id, last_fetched_at, and bearer-token
        configuration.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Twitter service status
      tags:
      - twitter
schemes:
- http
- https
swagger: "2.0"
