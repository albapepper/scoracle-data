# Scoracle log rotation — install at /etc/logrotate.d/scoracle
#
#   sudo cp scripts/hosting/logrotate.conf /etc/logrotate.d/scoracle
#
# The Go API logs via systemd journal (already bounded). These rules cover
# plaintext cron + backup logs only.

/home/sheneveld/scoracle-data/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    create 0644 sheneveld sheneveld
}
